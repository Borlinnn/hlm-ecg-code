seed: 7
device: auto
paths:
  data_root: data/ptb-xl
  day1_index: outputs/day1_audit/ptbxl_day1_index.csv
  norm_stats: outputs/day1_audit/train_norm_stats.npz
  output_dir: outputs/component_ablation/structured_masking_plus_availability/seed7
model:
  in_channels: 12
  num_classes: 5
  base_channels: 16
  layers:
  - 1
  - 1
  - 1
  - 1
  kernel_size: 7
  use_availability_embedding: true
  availability_embedding_dim: 32
  mask_mlp_hidden_dim: 32
  subclass_auxiliary_head: false
  hierarchy_loss: false
  confidence_weighted_consistency: false
  calibration: false
training:
  batch_size: 32
  num_workers: 0
  max_epochs: 30
  lr: 0.001
  weight_decay: 0.0001
  scheduler: reduce_on_plateau
  early_stopping_patience: 8
structured_masking:
  enabled: true
  fill_mode: mean_fill
  random_missing_counts:
  - 0
  - 1
  - 3
  - 6
  random_prob: 0.5
  structured_prob: 0.5
  structured_patterns:
  - limb_only__precordial_missing
  - precordial_only__limb_missing
  - V1_V3_missing
  - V4_V6_missing
  min_available_leads: 1
  seed: 7
  note: 'Availability ablation copies structured masking training: normalize with
    train stats, set missing normalized leads to zero, and pass the matching 12-dim
    availability mask to the model.'
evaluation:
  batch_size: 64
  num_workers: 0
  pattern_seed: 20240604
smoke:
  train_limit: 64
  val_limit: 64
  test_limit: 64
